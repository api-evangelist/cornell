  - date: '2026-06-03'
    rating: 3
    summary: >-
      Cornell has a real but decentralized public API footprint, with no single
      developer gateway. Verified live and documented: the Class Roster API (v2.0,
      JSON/XML, documented rate limit of 1 req/sec), the eCommons DSpace REST API
      and OAI-PMH endpoint, and the Cornell-hosted arXiv API. The student-led CODI
      open-data project is real and has a live website and GitHub org, but several
      data repos are archived and the platform is self-described as outdated, so
      it is cataloged honestly rather than as a stable API. Shibboleth/SAML IdP
      metadata resolves. No endpoints were fabricated; every URL below was probed
      with curl.
