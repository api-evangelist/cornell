apis:
  - aid: cornell:class-roster
    name: Cornell Class Roster API
    description: >-
      Public read-only API (version 2.0) for Cornell Class Roster data,
      providing scheduled classes with Course of Study details plus
      configuration lookups for rosters, academic careers, academic groups,
      class levels, and subjects. All methods are GET and return XML or JSON.
      Usage should be limited to no more than one request per second.
    humanURL: https://classes.cornell.edu/content/FA25/api-details
    baseURL: https://classes.cornell.edu/api/2.0/
    tags: [ Course Catalog, Class Roster, Education, Scheduling ]
    properties:
      - type: Documentation
        url: https://classes.cornell.edu/content/FA25/api-details
  - aid: cornell:ecommons
    name: eCommons Digital Repository (DSpace REST and OAI-PMH)
    description: >-
      eCommons is Cornell University Library's institutional repository, running
      on DSpace 7+. It exposes a public DSpace REST API for items, communities,
      collections, and bitstreams, and an OAI-PMH endpoint for metadata
      harvesting using Dublin Core. The library migrated to new DSpace
      infrastructure in January 2026.
    humanURL: https://guides.library.cornell.edu/ecommons/syndication
    baseURL: https://ecommons.cornell.edu/server/api
    tags: [ Library, Institutional Repository, OAI-PMH, DSpace, Research ]
    properties:
      - type: Documentation
        url: https://guides.library.cornell.edu/ecommons/syndication
      - type: Authentication
        url: https://ecommons.cornell.edu/oai/request?verb=Identify
  - aid: cornell:arxiv
    name: arXiv API
    description: >-
      arXiv, hosted and stewarded by Cornell University, provides a long-running
      public API for programmatic search and retrieval of e-print metadata
      across physics, mathematics, computer science, and other fields. The query
      interface returns Atom-formatted results.
    humanURL: https://info.arxiv.org/help/api/index.html
    baseURL: http://export.arxiv.org/api/
    tags: [ Research, Open Access, Preprints, Metadata ]
    properties:
      - type: Documentation
        url: https://info.arxiv.org/help/api/index.html
  - aid: cornell:codi
    name: Cornell Open Data Initiative (CODI)
    description: >-
      CODI is a student-led effort to publish open Cornell data including campus
      map points of interest, transit (TCAT) schedules and stops, dining, and
      events. API documentation has been synced to SwaggerHub via the CODI
      repositories, but several CODI data repos are archived and the platform is
      described as undergoing a revamp with datasets that may be outdated.
    humanURL: https://codi.engineering.cornell.edu/
