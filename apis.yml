aid: cornell
name: Cornell University
description: >-
  Cornell University is a private Ivy League and statutory land-grant research
  university based in Ithaca, New York, ranked #16 in the QS World University
  Rankings 2025. Its public developer footprint is decentralized rather than
  served through a single API gateway: the Class Roster team publishes a
  documented Class Roster API for course and scheduling data, the Cornell
  University Library operates the eCommons digital repository on DSpace with
  REST and OAI-PMH access, and Cornell hosts arXiv with its long-standing public
  arXiv API. The student-led Cornell Open Data Initiative (CODI) additionally
  exposes campus map, transit, dining, and events datasets, though parts of that
  platform are archived or marked as likely outdated.
